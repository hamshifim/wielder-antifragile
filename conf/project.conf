ecosystem = "local"

wielder_antifragile {
  execution_identity {
    user_name = ${user_name}
    provider = ${provider}
    agent_type = ${agent_type}
    agent_instance_id = ${agent_instance_id}
    agent_name = ${wielder_antifragile.execution_identity.provider}"_"${wielder_antifragile.execution_identity.agent_type}"_"${wielder_antifragile.execution_identity.agent_instance_id}
    agent_version = ${agent_version}
    session_id = ${session_id}
    run_id = ${run_id}
    invoked_at_utc = ${invoked_at_utc}
  }

  roots {
    foundation_root = ${project_root}"/foundation"
    personas_root = ${wielder_antifragile.roots.foundation_root}"/personas"
    skills_root = ${wielder_antifragile.roots.foundation_root}"/skills"
    workflows_root = ${wielder_antifragile.roots.foundation_root}"/workflows"
    contracts_root = ${wielder_antifragile.roots.foundation_root}"/contracts"
    playbooks_root = ${wielder_antifragile.roots.foundation_root}"/playbooks"
    audit_root = ${project_root}"/.foundation_audit"
  }
}
